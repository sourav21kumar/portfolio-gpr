<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- Amazon EventBridge: hot pink + white network/event-bus icon -->
  <rect width="48" height="48" rx="7" fill="#E7157B"/>
  <!-- Central hub node -->
  <circle cx="24" cy="24" r="3.5" fill="white"/>
  <!-- Spokes to outer event nodes -->
  <line x1="24" y1="24" x2="12" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="36" y2="14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="12" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="36" y2="34" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="24" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="24" y2="38" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Outer event source/target nodes -->
  <circle cx="12" cy="14" r="3" fill="white"/>
  <circle cx="36" cy="14" r="3" fill="white"/>
  <circle cx="12" cy="34" r="3" fill="white"/>
  <circle cx="36" cy="34" r="3" fill="white"/>
  <circle cx="24" cy="10" r="3" fill="white"/>
  <circle cx="24" cy="38" r="3" fill="white"/>
</svg>
