<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <!-- AWS Lambda: orange square + white λ symbol + Amazon smile arc -->
  <rect width="48" height="48" rx="7" fill="#E8681A"/>
  <!-- Lambda symbol (Λ) — two strokes meeting at apex -->
  <path d="M13 37 L24 11 L35 37" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Inner connecting bar (distinguishes λ from plain Λ) -->
  <path d="M19 27 L29 27" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Amazon smile arc below -->
  <path d="M16 42 Q24 46 32 42" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M31 40 L32 42 L30 43" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
