<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ───────────────────────────────────────────── -->
    <title>Gayani Polireddy — Full-Stack Engineer & Content Creator</title>
    <meta name="description" content="Portfolio of Gayani Polireddy — Full-Stack Software Engineer and Content Creator based in Hyderabad, India. Specialises in Spring Boot, Angular, AWS, and scalable web applications." />
    <meta name="keywords" content="Gayani Polireddy, Full Stack Developer, Software Engineer, Content Creator, Spring Boot, Angular, AWS, Java, React, Hyderabad, portfolio" />
    <meta name="author" content="Gayani Polireddy" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://gayanipolireddy.com/" />
    <meta name="theme-color" content="#ff2d8e" />

    <!-- ── Open Graph (Facebook, LinkedIn, WhatsApp previews) ───── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://gayanipolireddy.com/" />
    <meta property="og:title"       content="Gayani Polireddy — Full-Stack Engineer & Content Creator" />
    <meta property="og:description" content="Full-Stack Software Engineer and Content Creator based in Hyderabad. Building scalable digital experiences and stories that inspire." />
    <meta property="og:image"       content="https://gayanipolireddy.com/assets/images/portrait.jpeg" />
    <meta property="og:image:alt"   content="Gayani Polireddy" />
    <meta property="og:site_name"   content="Gayani Polireddy Portfolio" />
    <meta property="og:locale"      content="en_IN" />

    <!-- ── Twitter / X Card ─────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Gayani Polireddy — Full-Stack Engineer & Content Creator" />
    <meta name="twitter:description" content="Full-Stack Software Engineer and Content Creator based in Hyderabad. Building scalable digital experiences and stories that inspire." />
    <meta name="twitter:image"       content="https://gayanipolireddy.com/assets/images/portrait.jpeg" />

    <!-- ── Favicon (swapped dynamically by React on mode change) ── -->
    <link rel="icon" type="image/jpeg" href="/assets/images/portrait.jpeg" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Gayani Polireddy",
      "url": "https://gayanipolireddy.com",
      "image": "https://gayanipolireddy.com/assets/images/portrait.jpeg",
      "email": "gayanis.work@gmail.com",
      "jobTitle": "Full-Stack Software Engineer",
      "description": "Full-Stack Software Engineer and Content Creator based in Hyderabad, India.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Hyderabad",
        "addressCountry": "IN"
      },
      "sameAs": [
        "https://github.com/Gayanireddy",
        "https://linkedin.com/in/gayani-reddy-profile",
        "https://www.instagram.com/just.gayani_/"
      ]
    }
    </script>

    <!-- ── Fonts ─────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    />
